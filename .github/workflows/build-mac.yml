name: Build macOS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-13      # Intel x64
            arch: x64
          - os: macos-latest  # Apple Silicon arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild better-sqlite3
        run: npx electron-rebuild -f -w better-sqlite3 --arch ${{ matrix.arch }}

      - name: Build DMG
        run: npx electron-builder --mac --${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaswa-jebel-caly-mac-${{ matrix.arch }}
          path: dist/*.dmg
          retention-days: 30
