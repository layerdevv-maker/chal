name: Build macOS

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild better-sqlite3
        run: npx electron-rebuild -f -w better-sqlite3

      # ── arm64 (M1/M2/M3) ───────────────────────────────
      - name: Build app dir (arm64)
        run: npx electron-builder --mac --arm64 --dir --publish never

      - name: Sign + package DMG (arm64)
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "App: $APP"
          codesign --deep --force --sign - "$APP"
          mkdir -p /tmp/dmg-arm64
          cp -R "$APP" /tmp/dmg-arm64/
          ln -s /Applications /tmp/dmg-arm64/Applications
          hdiutil create \
            -volname "Kaswa Jebel Caly" \
            -srcfolder /tmp/dmg-arm64 \
            -ov -format UDZO \
            "dist/Kaswa-Jebel-Caly-arm64.dmg"

      - name: Clean dist apps
        run: rm -rf dist/mac*

      # ── x64 (Intel) ────────────────────────────────────
      - name: Build app dir (x64)
        run: npx electron-builder --mac --x64 --dir --publish never

      - name: Sign + package DMG (x64)
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "App: $APP"
          codesign --deep --force --sign - "$APP"
          mkdir -p /tmp/dmg-x64
          cp -R "$APP" /tmp/dmg-x64/
          ln -s /Applications /tmp/dmg-x64/Applications
          hdiutil create \
            -volname "Kaswa Jebel Caly" \
            -srcfolder /tmp/dmg-x64 \
            -ov -format UDZO \
            "dist/Kaswa-Jebel-Caly-x64.dmg"

      # ── Upload ─────────────────────────────────────────
      - name: Upload DMGs
        uses: actions/upload-artifact@v4
        with:
          name: kaswa-jebel-caly-mac
          path: dist/Kaswa-Jebel-Caly-*.dmg
          retention-days: 30
