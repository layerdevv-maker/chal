name: Build macOS

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild better-sqlite3
        run: npx electron-rebuild -f -w better-sqlite3

      # ── arm64 ──────────────────────────────────────────
      - name: Build app (arm64)
        run: npx electron-builder --mac --arm64 --dir --publish never

      - name: Find and sign arm64
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "Found app: $APP"
          codesign --deep --force --sign - "$APP"
          hdiutil create -volname "Kaswa Jebel Caly" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "dist/Kaswa-Jebel-Caly-arm64.dmg"

      - name: Clean dist apps
        run: rm -rf dist/mac*

      # ── x64 ────────────────────────────────────────────
      - name: Build app (x64)
        run: npx electron-builder --mac --x64 --dir --publish never

      - name: Find and sign x64
        run: |
          APP=$(find dist -name "*.app" -maxdepth 3 | head -1)
          echo "Found app: $APP"
          codesign --deep --force --sign - "$APP"
          hdiutil create -volname "Kaswa Jebel Caly" \
            -srcfolder "$APP" \
            -ov -format UDZO \
            "dist/Kaswa-Jebel-Caly-x64.dmg"

      # ── Upload ─────────────────────────────────────────
      - name: Upload DMGs
        uses: actions/upload-artifact@v4
        with:
          name: kaswa-jebel-caly-mac
          path: dist/Kaswa-Jebel-Caly-*.dmg
          retention-days: 30
