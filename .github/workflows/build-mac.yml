name: Build macOS

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Rebuild better-sqlite3
        run: npx electron-rebuild -f -w better-sqlite3

      # ── arm64 ──────────────────────────────────────────
      - name: Build app (arm64)
        run: npx electron-builder --mac --arm64 --dir --publish never

      - name: Sign arm64 (ad-hoc)
        run: codesign --deep --force --sign - "dist/mac-arm64/Kaswa Jebel Caly.app"

      - name: Package arm64 DMG
        run: |
          hdiutil create -volname "Kaswa Jebel Caly" \
            -srcfolder "dist/mac-arm64/Kaswa Jebel Caly.app" \
            -ov -format UDZO \
            "dist/Kaswa-Jebel-Caly-arm64.dmg"

      # ── x64 ────────────────────────────────────────────
      - name: Build app (x64)
        run: npx electron-builder --mac --x64 --dir --publish never

      - name: Sign x64 (ad-hoc)
        run: codesign --deep --force --sign - "dist/mac-x64/Kaswa Jebel Caly.app"

      - name: Package x64 DMG
        run: |
          hdiutil create -volname "Kaswa Jebel Caly" \
            -srcfolder "dist/mac-x64/Kaswa Jebel Caly.app" \
            -ov -format UDZO \
            "dist/Kaswa-Jebel-Caly-x64.dmg"

      # ── Upload ─────────────────────────────────────────
      - name: Upload DMGs
        uses: actions/upload-artifact@v4
        with:
          name: kaswa-jebel-caly-mac
          path: dist/Kaswa-Jebel-Caly-*.dmg
          retention-days: 30
